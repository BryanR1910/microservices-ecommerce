spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/BryanR1910/microservices-config-data.git
          username: ${GITHUB_USER}
          password: ${GITHUB_TOKEN}
          search-paths: config-data
          clone-on-start: true
          default-label: main
server:
  port: 8888
